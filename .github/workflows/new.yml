name: Build Aseprite for Windows

on:
  workflow_dispatch:   # 手动触发

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (CMake, Ninja)
        run: |
          choco install cmake ninja -y

      - name: Download Skia for Windows
        run: |
          curl -L https://github.com/aseprite/skia/releases/download/m124/WindowsSkia.zip -o skia.zip
          Expand-Archive -Path skia.zip -DestinationPath C:\deps\skia -Force

      - name: Configure with CMake
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -DLAF_BACKEND=skia -DSKIA_DIR=C:\deps\skia -G Ninja ..
        shell: cmd

      - name: Build
        run: |
          cd build
          ninja aseprite

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-windows
          path: build/bin/aseprite.exe
