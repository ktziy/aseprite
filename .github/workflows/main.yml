name: Build Aseprite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # 手动触发
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          choco install cmake ninja -y
          echo "C:\Program Files\CMake\bin" >> $env:GITHUB_PATH

      - name: Download Skia library
        run: |
          curl -L https://github.com/aseprite/skia/releases/download/m124/WindowsSkia.zip -o skia.zip
          Expand-Archive -Path skia.zip -DestinationPath C:\deps\skia

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo `
                -DLAF_BACKEND=skia `
                -DSKIA_DIR=C:\deps\skia `
                -G Ninja ..
        shell: cmd

      - name: Build
        run: |
          cd build
          ninja aseprite

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-windows
          path: build/bin/aseprite.exe

  build-macos:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install cmake ninja

      - name: Download Skia library
        run: |
          curl -L https://github.com/aseprite/skia/releases/download/m124/MacOSSkia.zip -o skia.zip
          unzip skia.zip -d $HOME/deps/skia

      - name: Configure CMake
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo \
                -DLAF_BACKEND=skia \
                -DSKIA_DIR=$HOME/deps/skia \
                -DCMAKE_OSX_SYSROOT=/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk \
                -G Ninja ..

      - name: Build
        run: |
          cd build
          ninja aseprite

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-macos
          path: build/bin/aseprite

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-15

      - name: Download Skia library
        run: |
          curl -L https://github.com/aseprite/skia/releases/download/m124/LinuxSkia.zip -o skia.zip
          unzip skia.zip -d $HOME/deps/skia

      - name: Configure CMake
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo \
                -DLAF_BACKEND=skia \
                -DSKIA_DIR=$HOME/deps/skia \
                -G Ninja ..

      - name: Build
        run: |
          cd build
          ninja aseprite

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-linux
          path: build/bin/aseprite
